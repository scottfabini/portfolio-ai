version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd frontend
        - echo "Verifying package files exist..."
        - ls -la package*.json
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: frontend/.next
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
      - frontend/.next/cache/**/* 