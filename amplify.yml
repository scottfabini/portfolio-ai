version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd frontend
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: frontend/.next
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
      - frontend/.next/cache/**/*

  - appRoot: backend/api
    backend:
      phases:
        build:
          commands:
            - ./mvnw clean package -DskipTests
      artifacts:
        baseDirectory: target
        files:
          - '*.jar'
      cache:
        paths:
          - ~/.m2/repository/**/* 