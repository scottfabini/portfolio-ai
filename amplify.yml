version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*

  - appRoot: backend/api
    backend:
      phases:
        build:
          commands:
            - ./mvnw clean package -DskipTests
      artifacts:
        baseDirectory: target
        files:
          - '*.jar'
      cache:
        paths:
          - ~/.m2/repository/**/* 